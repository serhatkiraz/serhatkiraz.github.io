<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serhat Kiraz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  color:#00ff88;
  font-family:'Courier New',monospace;
  overflow:hidden;
}

/* atmosfer */
body::before{
  content:'';
  position:fixed;
  width:100%;height:100%;
  background:
    radial-gradient(circle at 20% 50%,rgba(0,255,120,.15),transparent 60%),
    radial-gradient(circle at 80% 20%,rgba(0,255,120,.08),transparent 60%);
  z-index:-1;
}

/* ana alan */
.main{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* başlık */
h1{
  font-size:clamp(2.5rem,8vw,4rem);
  text-shadow:0 0 15px #00ff88;
  margin-bottom:10px;
}
.device{
  opacity:.6;
  margin-bottom:30px;
}

/* grid (tetris alanı) */
.grid{
  display:grid;
  grid-template-columns:repeat(4,80px);
  grid-auto-rows:80px;
  gap:10px;
  background:rgba(0,255,120,.05);
  padding:15px;
  border:1px solid rgba(0,255,120,.2);
}

/* bloklar */
.block{
  width:80px;height:80px;
  background:rgba(0,255,120,.1);
  border:1px solid #00ff88;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
  user-select:none;
  transition:.2s;
}
.block:hover{
  background:rgba(0,255,120,.2);
  transform:scale(1.05);
}
.block.dragging{
  opacity:.5;
}

/* patlama efekti */
.explode{
  animation:explode .4s forwards;
}
@keyframes explode{
  0%{transform:scale(1);opacity:1;}
  100%{transform:scale(2);opacity:0;}
}

.footer{
  position:absolute;
  bottom:20px;
  opacity:.5;
  font-size:.8rem;
}
</style>
</head>

<body>

<div class="main">
  <h1>Serhat Kiraz</h1>
  <div class="device" id="device"></div>

  <div class="grid" id="grid"></div>

  <div class="footer">drag · combine · explore</div>
</div>

<script>

/* cihaz algılama */
function detectDevice(){
  const ua = navigator.userAgent.toLowerCase();
  if(/iphone|ipad|ipod/.test(ua)) return "iOS";
  if(/android/.test(ua)) return "Android";
  return "Desktop";
}
document.getElementById("device").textContent = detectDevice();

/* projeler */
const projects = [
  {name:"Miras", link:"https://github.com/"},
  {name:"App 2", link:"https://github.com/"},
  {name:"App 3", link:"https://github.com/"},
  {name:"App 4", link:"https://github.com/"},
  {name:"App 5", link:"https://github.com/"},
];

const grid = document.getElementById("grid");

/* blok oluştur */
projects.forEach(p=>{
  const el = document.createElement("div");
  el.className="block";
  el.textContent=p.name;
  el.draggable=true;
  el.dataset.link=p.link;

  el.addEventListener("click",()=>{
    window.open(p.link,"_blank");
  });

  addDrag(el);
  grid.appendChild(el);
});

/* drag sistemi */
let dragEl=null;

function addDrag(el){
  el.addEventListener("dragstart",()=>{
    dragEl=el;
    el.classList.add("dragging");
  });

  el.addEventListener("dragend",()=>{
    el.classList.remove("dragging");
    checkLines();
  });
}

grid.addEventListener("dragover",(e)=>{
  e.preventDefault();
  const after = getAfterElement(e.clientX,e.clientY);
  if(after==null){
    grid.appendChild(dragEl);
  }else{
    grid.insertBefore(dragEl,after);
  }
});

/* pozisyon bul */
function getAfterElement(x,y){
  const els=[...grid.querySelectorAll(".block:not(.dragging)")];
  return els.find(el=>{
    const box=el.getBoundingClientRect();
    return x<box.right && y<box.bottom;
  });
}

/* satır kontrol + patlama */
function checkLines(){
  const rows = [...grid.children];

  for(let i=0;i<rows.length;i+=4){
    const slice = rows.slice(i,i+4);
    if(slice.length===4){
      // basit kontrol: hepsi doluysa patlat
      slice.forEach(el=>{
        el.classList.add("explode");
      });

      setTimeout(()=>{
        slice.forEach(el=>el.remove());
      },400);
    }
  }
}

</script>

</body>
</html>
