<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Serhat Kiraz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#010104;
  font-family:Inter;
  color:#fff;
  overflow:hidden; /* kritik */
}

/* ===== BACKGROUND ===== */
.bg{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 0%, #1a1a40, #010104);
  z-index:-1;
}

/* ===== TOP BAR ===== */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 2rem;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.3);
  z-index:10;
}

.logo{
  font-weight:800;
  color:#8b9eff;
}

/* ===== GAME AREA ===== */
.game{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:repeat(9, min(10vmin,70px));
  grid-template-rows:repeat(9, min(10vmin,70px));
  gap:2px;
}

.cell{
  background:#111;
}

/* ===== HERO OVERLAY ===== */
.hero{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:rgba(0,0,0,0.7);
  z-index:5;
}

.hero h1{
  font-size:3rem;
  margin-bottom:1rem;
}

.hero button{
  padding:1rem 2rem;
  border:none;
  background:#8b9eff;
  border-radius:30px;
  cursor:pointer;
}

/* ===== SIDE PANEL (about/projects) ===== */
.panel{
  position:absolute;
  right:0;
  top:70px;
  width:300px;
  height:calc(100% - 70px);
  background:rgba(15,15,30,0.8);
  backdrop-filter:blur(10px);
  padding:1rem;
  overflow:auto;
  transform:translateX(100%);
  transition:0.3s;
}

.panel.active{
  transform:translateX(0);
}

.panel h2{
  margin-bottom:1rem;
}

/* ===== BUTTONS ===== */
.ui-btn{
  background:#1e1f3a;
  border:none;
  color:#fff;
  padding:0.5rem 1rem;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<div class="navbar">
  <div class="logo">Serhat Kiraz</div>
  <div>
    <button class="ui-btn" onclick="togglePanel()">Projects</button>
  </div>
</div>

<!-- GAME -->
<div class="game">
  <div id="board" class="board"></div>
</div>

<!-- HERO (homepage giriş) -->
<div id="hero" class="hero">
  <h1>Pixel Perfect<br>Game World</h1>
  <button onclick="start()">OYNA</button>
</div>

<!-- SIDE PANEL -->
<div id="panel" class="panel">
  <h2>Projects</h2>
  <p>• Miras App</p>
  <p>• Puzzle Game</p>
  <p>• UI Experiments</p>
</div>

<script>
/* BOARD */
const SIZE=9;
const board=document.getElementById("board");

for(let i=0;i<SIZE*SIZE;i++){
  const c=document.createElement("div");
  c.className="cell";
  board.appendChild(c);
}

/* HERO START */
function start(){
  document.getElementById("hero").style.display="none";
}

/* PANEL */
function togglePanel(){
  document.getElementById("panel").classList.toggle("active");
}
</script>

</body>
</html>
