<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Karıcım OS</title>

<style>
:root{
  --bg:#05080f;
  --accent:#3ad1b8;
  --glass:rgba(255,255,255,0.05);
  --blur:blur(10px);
  --cell-size:min(10vmin,70px);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:radial-gradient(circle at center,#081018,#02040a);
  font-family:system-ui;
  color:#fff;
  overflow:hidden;
}

/* ====== FULLSCREEN LAYER ====== */
.app{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ====== HEADER (homepage hissi) ====== */
.topbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 1rem;
  backdrop-filter:var(--blur);
  background:var(--glass);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
  font-weight:700;
  color:var(--accent);
}

.menu{
  display:flex;
  gap:1rem;
  font-size:0.9rem;
  opacity:0.7;
}

/* ====== GAME AREA ====== */
.game-area{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:repeat(9,var(--cell-size));
  grid-template-rows:repeat(9,var(--cell-size));
  background:#0b1118;
  padding:8px;
  border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.cell{
  background:#111;
  border:1px solid rgba(255,255,255,0.05);
}

/* ====== BOTTOM UI ====== */
.bottom{
  height:140px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  backdrop-filter:var(--blur);
  background:var(--glass);
  border-top:1px solid rgba(255,255,255,0.05);
}

/* PICKER */
.picker{
  display:flex;
  gap:1rem;
}

.block{
  width:var(--cell-size);
  height:var(--cell-size);
  border-radius:6px;
  background:var(--accent);
}

/* SCORE */
.score{
  position:absolute;
  top:80px;
  right:20px;
  background:var(--glass);
  padding:10px 20px;
  border-radius:10px;
  backdrop-filter:var(--blur);
}

/* BUTTON */
.btn{
  margin-top:10px;
  background:var(--accent);
  color:#000;
  padding:10px 20px;
  border-radius:30px;
  border:none;
  cursor:pointer;
}

/* INTRO OVERLAY */
.intro{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index:10;
}

.intro button{
  font-size:1.2rem;
  padding:1rem 2rem;
  border-radius:40px;
  border:none;
  background:var(--accent);
}
</style>
</head>

<body>

<div class="app">

  <div class="topbar">
    <div class="logo">Karıcım</div>
    <div class="menu">
      <div>Skor</div>
      <div>Ayar</div>
    </div>
  </div>

  <div class="game-area">
    <div id="board" class="board"></div>

    <div class="score">
      ❤️ <span id="score">0</span>
    </div>

    <div id="intro" class="intro">
      <button onclick="startGame()">OYNA</button>
    </div>
  </div>

  <div class="bottom">
    <div class="picker" id="picker"></div>
    <button class="btn" onclick="rotate()">↻ Döndür</button>
  </div>

</div>

<script>
const SIZE=9;
let score=0;

/* BOARD */
const boardEl=document.getElementById("board");
for(let i=0;i<SIZE*SIZE;i++){
  const c=document.createElement("div");
  c.className="cell";
  boardEl.appendChild(c);
}

/* SIMPLE PIECES */
function createPiece(){
  const p=document.createElement("div");
  p.className="block";
  return p;
}

function fillPicker(){
  const picker=document.getElementById("picker");
  picker.innerHTML="";
  for(let i=0;i<3;i++){
    picker.appendChild(createPiece());
  }
}

/* START */
function startGame(){
  document.getElementById("intro").style.display="none";
  fillPicker();
}

/* ROTATE */
function rotate(){
  document.querySelectorAll(".block").forEach(b=>{
    b.style.transform="rotate(90deg)";
    setTimeout(()=>b.style.transform="rotate(0)",200);
  });
}

/* SCORE TEST */
setInterval(()=>{
  score++;
  document.getElementById("score").textContent=score;
},2000);

</script>

</body>
</html>
