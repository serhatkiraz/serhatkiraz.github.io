<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Serhat Kiraz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#010104;
  --accent:#8b9eff;
  --cell:min(10vmin,70px);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:radial-gradient(circle at top,#1a1a40,#010104);
  font-family:Inter;
  color:#fff;
  overflow:hidden;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:1rem;
  font-weight:800;
  z-index:5;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

/* BOARD */
.board{
  position:absolute;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:repeat(9,var(--cell));
  grid-template-rows:repeat(9,var(--cell));
}

.cell{
  border:1px solid rgba(255,255,255,0.05);
  background:#111;
  position:relative;
}

.fill{
  width:100%;
  height:100%;
  border-radius:6px;
}

/* PICKER (projeler) */
.picker{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:1rem;
}

/* PROJECT BLOCK */
.project{
  display:grid;
  gap:4px;
  padding:6px;
  cursor:grab;
}

.block{
  width:var(--cell);
  height:var(--cell);
  border-radius:6px;
}

/* LABEL */
.label{
  position:absolute;
  bottom:4px;
  left:4px;
  font-size:10px;
}

/* EXPLOSION */
.fragment{
  position:fixed;
  width:10px;
  height:10px;
  border-radius:50%;
  pointer-events:none;
  animation:explode 0.6s forwards;
}

@keyframes explode{
  to{
    transform:translate(var(--x),var(--y)) scale(0);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="header">Serhat Kiraz — drag & play</div>

<div id="board" class="board"></div>
<div id="picker" class="picker"></div>

<script>
const SIZE=9;
let board=Array(SIZE).fill().map(()=>Array(SIZE).fill(0));

const PROJECTS=[
 {name:"Miras",shape:[[0,0],[1,0],[0,1]]},
 {name:"Game",shape:[[0,0],[1,0],[2,0]]},
 {name:"UI",shape:[[0,0],[0,1],[0,2]]},
];

const boardEl=document.getElementById("board");

/* BOARD */
for(let i=0;i<SIZE*SIZE;i++){
  const c=document.createElement("div");
  c.className="cell";
  boardEl.appendChild(c);
}

/* CREATE PROJECT */
function createProject(p){
  const el=document.createElement("div");
  el.className="project";
  el.dataset.name=p.name;
  el.shape=p.shape;

  const color=`hsl(${Math.random()*360},70%,60%)`;

  const w=Math.max(...p.shape.map(c=>c[0]))+1;
  const h=Math.max(...p.shape.map(c=>c[1]))+1;

  el.style.gridTemplateColumns=`repeat(${w},auto)`;

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const has=p.shape.some(c=>c[0]==x&&c[1]==y);
      const b=document.createElement("div");
      if(has){
        b.className="block";
        b.style.background=color;
      }
      el.appendChild(b);
    }
  }

  el.onpointerdown=e=>startDrag(e,el,p.shape,color,p.name);

  return el;
}

/* PICKER */
function fillPicker(){
  const picker=document.getElementById("picker");
  picker.innerHTML="";
  PROJECTS.forEach(p=>picker.appendChild(createProject(p)));
}

/* DRAG */
let drag=null;

function startDrag(e,el,shape,color,name){
  drag={shape,color,name};
  document.onpointermove=move;
  document.onpointerup=drop;
}

function move(e){}

function drop(e){
  const rect=boardEl.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)/(rect.width/SIZE));
  const y=Math.floor((e.clientY-rect.top)/(rect.height/SIZE));

  place(drag.shape,y,x,drag.color,drag.name);

  drag=null;
  document.onpointermove=null;
  document.onpointerup=null;
}

/* PLACE */
function place(shape,row,col,color,name){
  for(const [dx,dy] of shape){
    const r=row+dy,c=col+dx;
    if(r<0||c<0||r>=SIZE||c>=SIZE)return;
  }

  shape.forEach(([dx,dy])=>{
    const r=row+dy,c=col+dx;
    board[r][c]=1;
    const cell=boardEl.children[r*SIZE+c];

    const f=document.createElement("div");
    f.className="fill";
    f.style.background=color;

    const label=document.createElement("div");
    label.className="label";
    label.innerText=name;

    f.appendChild(label);
    cell.appendChild(f);
  });

  checkLines();
}

/* LINE CLEAR */
function checkLines(){
  for(let r=0;r<SIZE;r++){
    if(board[r].every(v=>v)){
      explodeRow(r);
    }
  }
}

/* EXPLOSION */
function explodeRow(r){
  for(let c=0;c<SIZE;c++){
    const cell=boardEl.children[r*SIZE+c];
    const rect=cell.getBoundingClientRect();

    for(let i=0;i<8;i++){
      const frag=document.createElement("div");
      frag.className="fragment";
      frag.style.left=rect.left+"px";
      frag.style.top=rect.top+"px";
      frag.style.background=cell.firstChild?.style.background||"#fff";

      frag.style.setProperty("--x",(Math.random()*100-50)+"px");
      frag.style.setProperty("--y",(Math.random()*100-50)+"px");

      document.body.appendChild(frag);
      setTimeout(()=>frag.remove(),600);
    }

    cell.innerHTML="";
    board[r][c]=0;
  }
}

/* INIT */
fillPicker();
</script>

</body>
</html>
