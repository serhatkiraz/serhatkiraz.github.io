<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Serhat Kiraz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --accent:#8b9eff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:radial-gradient(circle at 20% 0%,#1a1a40,#05060a);
  font-family:Inter;
  color:#fff;
  height:100vh;
  overflow:hidden;
}

/* ===== ATMOSPHERE ===== */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
}

.blob{
  position:absolute;
  width:400px;
  height:400px;
  filter:blur(100px);
  opacity:.4;
  border-radius:50%;
  animation:float 20s infinite alternate;
}

.b1{background:#6c5ce7; top:-100px; left:-100px;}
.b2{background:#00b4d8; bottom:-100px; right:-100px;}

@keyframes float{
  to{transform:translate(80px,60px)}
}

/* ===== DEVICE FRAME ===== */
.device{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* PHONE */
.phone{
  width:320px;
  height:640px;
  border-radius:40px;
  background:#000;
  padding:12px;
  box-shadow:0 40px 100px rgba(0,0,0,0.7);
}

.screen{
  width:100%;
  height:100%;
  border-radius:30px;
  overflow:hidden;
  background:#0b0f1a;
  position:relative;
}

/* PC */
.pc{
  width:800px;
  height:500px;
  border-radius:20px;
  background:#111;
  padding:10px;
}

/* HEADER */
.header{
  position:absolute;
  top:0;
  width:100%;
  text-align:center;
  padding:10px;
  font-size:14px;
  opacity:.7;
}

/* BOARD */
.board{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:repeat(9,28px);
  grid-template-rows:repeat(9,28px);
}

.cell{
  border:1px solid rgba(255,255,255,0.05);
}

/* PICKER */
.picker{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

/* PROJECT BLOCK */
.project{
  display:grid;
  gap:3px;
  cursor:grab;
}

.block{
  width:28px;
  height:28px;
  border-radius:4px;
}

/* LABEL */
.label{
  position:absolute;
  font-size:9px;
  bottom:2px;
  left:2px;
}
</style>
</head>

<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
</div>

<div id="device" class="device"></div>

<script>
/* ===== DEVICE DETECT ===== */
function getDevice(){
  const ua=navigator.userAgent.toLowerCase();
  if(/android/.test(ua)) return "android";
  if(/iphone|ipad/.test(ua)) return "ios";
  return "pc";
}

const deviceType=getDevice();
const root=document.getElementById("device");

/* ===== CREATE FRAME ===== */
let container;

if(deviceType==="pc"){
  container=document.createElement("div");
  container.className="pc";
}else{
  container=document.createElement("div");
  container.className="phone";
}

const screen=document.createElement("div");
screen.className="screen";

container.appendChild(screen);
root.appendChild(container);

/* HEADER */
const header=document.createElement("div");
header.className="header";
header.innerText="Serhat Kiraz";
screen.appendChild(header);

/* BOARD */
const SIZE=9;
const board=document.createElement("div");
board.className="board";

let grid=[];
for(let i=0;i<SIZE*SIZE;i++){
  const c=document.createElement("div");
  c.className="cell";
  board.appendChild(c);
}
screen.appendChild(board);

/* PICKER */
const picker=document.createElement("div");
picker.className="picker";
screen.appendChild(picker);

/* ===== GITHUB PROJECTS ===== */
async function loadProjects(){
  const res=await fetch("https://api.github.com/users/USERNAME/repos");
  const data=await res.json();

  const selected=data.slice(0,5);

  selected.forEach(repo=>{
    picker.appendChild(createProject(repo));
  });
}

/* PROJECT BLOCK */
function createProject(repo){
  const el=document.createElement("div");
  el.className="project";

  const shape=[[0,0],[1,0],[0,1]]; // basit

  const color=`hsl(${Math.random()*360},70%,60%)`;

  el.style.gridTemplateColumns="repeat(2,auto)";

  shape.forEach(()=>{
    const b=document.createElement("div");
    b.className="block";
    b.style.background=color;
    el.appendChild(b);
  });

  el.onpointerdown=e=>{
    drag={repo,shape,color};
    document.onpointerup=drop;
  };

  return el;
}

/* DRAG DROP */
let drag=null;

function drop(e){
  if(!drag)return;

  const rect=board.getBoundingClientRect();
  const col=Math.floor((e.clientX-rect.left)/28);
  const row=Math.floor((e.clientY-rect.top)/28);

  place(drag,row,col);

  drag=null;
  document.onpointerup=null;
}

/* PLACE */
function place(d,row,col){
  d.shape.forEach(([dx,dy])=>{
    const r=row+dy,c=col+dx;
    if(r<0||c<0||r>=SIZE||c>=SIZE)return;

    const cell=board.children[r*SIZE+c];

    const f=document.createElement("div");
    f.className="block";
    f.style.background=d.color;

    const label=document.createElement("div");
    label.className="label";
    label.innerText=d.repo.name;

    f.appendChild(label);

    f.onclick=()=>window.open(d.repo.html_url);

    cell.appendChild(f);
  });
}

/* INIT */
loadProjects();
</script>

</body>
</html>
